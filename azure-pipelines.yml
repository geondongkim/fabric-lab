trigger:
  paths:
    include:
      - app/*

pool:
  name: 'Default'

variables:
  ANDROID_SDK_DIR: 'C:\Users\EL035\AppData\Local\Android\Sdk'
  JAVA_HOME_DIR: 'C:\Program Files\Android\Android Studio\jbr'

steps:
  - checkout: self
    clean: true
    fetchDepth: 1
    displayName: 'Get App Sources'

  - task: NodeTool@0
    inputs:
      versionSpec: '24.x'
    displayName: 'Install Node.js'

  - script: |
      cd app
      npm install
    displayName: 'Install App Dependencies'

  - script: |
      cd app
      npx expo prebuild --platform android --no-install
    displayName: 'Expo Prebuild (Generate Android Folder)'
    env:
      CI: 'true'

  # gitignore된 local.properties 수동 생성 (sdk.dir 경로 주입)
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        $sdkPath = "$(ANDROID_SDK_DIR)" -replace '\\', '/'
        $localProps = "$(System.DefaultWorkingDirectory)\app\android\local.properties"
        $content = "sdk.dir=$sdkPath"
        Write-Host "Writing local.properties to: $localProps"
        Write-Host "Content: $content"
        $content | Out-File -FilePath $localProps -Encoding ascii -NoNewline
        Write-Host "[local.properties contents]"
        Get-Content $localProps
    displayName: 'Create android/local.properties'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  # Windows 에이전트용 빌드 단계
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "ANDROID_HOME : $env:ANDROID_HOME"
        Write-Host "JAVA_HOME    : $env:JAVA_HOME"
        $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"
        Set-Location "$(System.DefaultWorkingDirectory)\app\android"
        & .\gradlew.bat assembleDebug --no-daemon
    env:
      ANDROID_HOME: $(ANDROID_SDK_DIR)
      JAVA_HOME: $(JAVA_HOME_DIR)
    displayName: 'Build Android Debug APK (Windows)'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  # macOS/Linux 에이전트용 빌드 단계
  - script: |
      cd app/android
      chmod +x gradlew
      ./gradlew assembleDebug --no-daemon
    displayName: 'Build Android Debug APK (Unix)'
    condition: ne(variables['Agent.OS'], 'Windows_NT')
    env:
      ANDROID_HOME: $(ANDROID_SDK_DIR)

  - task: CopyFiles@2
    inputs:
      SourceFolder: 'app/android/app/build/outputs/apk/debug'
      Contents: '**/*.apk'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Copy Debug APK'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'app-debug-$(Agent.OS)'
    displayName: 'Publish App Artifact'
 