trigger:
  paths:
    include:
      - app/*

pool:
  name: 'Default'

steps:
  - checkout: self
    clean: true
    fetchDepth: 1
    displayName: 'Get App Sources'

  - task: NodeTool@0
    inputs:
      versionSpec: '24.x'
    displayName: 'Install Node.js'

  - script: |
      cd app
      npm install
    displayName: 'Install App Dependencies'

  - script: |
      cd app
      npx expo prebuild --platform android
    displayName: 'Expo Prebuild (Generate Android Folder)'

  # Windows 에이전트용 빌드 단계
  - script: |
      cd app/android
      gradlew.bat assembleDebug
    displayName: 'Build Android Debug APK (Windows)'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  # macOS/Linux 에이전트용 빌드 단계
  - script: |
      cd app/android
      chmod +x gradlew
      ./gradlew assembleDebug
    displayName: 'Build Android Debug APK (Unix)'
    condition: ne(variables['Agent.OS'], 'Windows_NT')

  - task: CopyFiles@2
    inputs:
      SourceFolder: 'app/android/app/build/outputs/apk/debug'
      Contents: '**/*.apk'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Copy Debug APK'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'app-debug-$(Agent.OS)'
    displayName: 'Publish App Artifact'
 