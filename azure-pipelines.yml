trigger:
  paths:
    include:
      - app/*

pool:
  name: 'Default'

variables:
  ANDROID_SDK_DIR: 'C:\Android\Sdk'
  JAVA_HOME_DIR: 'C:\Program Files\Android\Android Studio\jbr'

steps:
  - checkout: self
    clean: true
    fetchDepth: 1
    displayName: 'Get App Sources'

  - task: NodeTool@0
    inputs:
      versionSpec: '24.x'
    displayName: 'Install Node.js'

  - script: |
      cd app
      npm install
    displayName: 'Install App Dependencies'

  - script: |
      cd app
      npx expo prebuild --platform android --no-install
    displayName: 'Expo Prebuild (Generate Android Folder)'
    env:
      CI: 'true'

  # local.properties 생성 + Gradle 빌드 (동일 프로세스로 env var 공유)
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        $sdkRoot    = "$(ANDROID_SDK_DIR)"
        $javaDir    = "$(JAVA_HOME_DIR)"
        $cmdLatest  = "$sdkRoot\cmdline-tools\latest"
        $sdkMgr     = "$cmdLatest\bin\sdkmanager.bat"

        # ── SDK 자동 설치 (에이전트 접근 가능한 C:\Android\Sdk 경로) ──────────
        if (-not (Test-Path $sdkMgr -ErrorAction SilentlyContinue)) {
          Write-Host "=== Android SDK not found — installing to $sdkRoot ==="
          $zip = "$env:TEMP\cmdline-tools.zip"
          if (-not (Test-Path $zip)) {
            Write-Host "Downloading command-line tools..."
            Invoke-WebRequest -Uri "https://dl.google.com/android/repository/commandlinetools-win-9477386_latest.zip" -OutFile $zip -UseBasicParsing
          }
          Write-Host "Extracting..."
          $extract = "$env:TEMP\cmdline-tools-extract"
          Remove-Item $extract -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          New-Item -ItemType Directory -Path $cmdLatest -Force | Out-Null
          Copy-Item -Path "$extract\cmdline-tools\*" -Destination $cmdLatest -Recurse -Force
          Remove-Item $extract -Recurse -Force -ErrorAction SilentlyContinue
        }

        # ── 라이선스 파일 직접 생성 (자동 수락) ────────────────────────────
        $licDir = "$sdkRoot\licenses"
        New-Item -ItemType Directory -Path $licDir -Force | Out-Null
        Set-Content -Path "$licDir\android-sdk-license"         -Value "`nd56f5187479451eabf01fb78af6dfcb131a6481e`n24333f8a63b6825ea9c5514f83c2829b004d1fee"
        Set-Content -Path "$licDir\android-sdk-preview-license" -Value "`n84831b9409646a918e30573bab4c9c91346d8abd"
        Set-Content -Path "$licDir\android-ndk-license"         -Value "`n592519258e7aef9151374fd9ef8e3d06c65a7fe3"
        Write-Host "Licenses pre-accepted."

        # ── 필요한 SDK 패키지 설치 ───────────────────────────────────────────
        $env:JAVA_HOME = $javaDir
        $env:PATH      = "$javaDir\bin;$env:PATH"
        $packages = @("platform-tools", "platforms;android-36", "build-tools;36.0.0", "ndk;27.1.12297006")
        foreach ($pkg in $packages) {
          $installed = & $sdkMgr --list_installed --sdk_root="$sdkRoot" 2>&1 | Select-String ($pkg -replace ";",";")
          if (-not $installed) {
            Write-Host "Installing $pkg ..."
            echo "y" | & $sdkMgr --sdk_root="$sdkRoot" $pkg 2>&1 | Select-Object -Last 3
          } else {
            Write-Host "$pkg already installed"
          }
        }
    displayName: 'Setup Android SDK'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  # local.properties 생성 + Gradle 빌드 (동일 프로세스로 env var 공유)
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        $sdkDir  = "$(ANDROID_SDK_DIR)"
        $javaDir = "$(JAVA_HOME_DIR)"
        $workDir = "$(System.DefaultWorkingDirectory)"

        # 진단 출력
        Write-Host "=== Diagnostics ==="
        Write-Host "Username     : $env:USERNAME"
        Write-Host "SDK dir      : $sdkDir"
        Write-Host "Java dir     : $javaDir"

        # local.properties 작성 (Expo prebuild 생성본 덮어쓰기)
        $sdkDirFwd = $sdkDir -replace '\\', '/'
        $localProps = "$workDir\app\android\local.properties"
        "sdk.dir=$sdkDirFwd" | Out-File -FilePath $localProps -Encoding ascii -NoNewline
        Write-Host "local.properties : $(Get-Content $localProps)"

        # 동일 프로세스에서 env var 설정 후 Gradle 실행
        $env:ANDROID_HOME     = $sdkDir
        $env:ANDROID_SDK_ROOT = $sdkDir
        $env:JAVA_HOME        = $javaDir
        $env:PATH             = "$javaDir\bin;$env:PATH"

        Write-Host "=== Build Start ==="
        Set-Location "$workDir\app\android"
        & .\gradlew.bat assembleDebug --no-daemon
    displayName: 'Build Android Debug APK (Windows)'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  # macOS/Linux 에이전트용 빌드 단계
  - script: |
      cd app/android
      chmod +x gradlew
      ./gradlew assembleDebug --no-daemon
    displayName: 'Build Android Debug APK (Unix)'
    condition: ne(variables['Agent.OS'], 'Windows_NT')
    env:
      ANDROID_HOME: $(ANDROID_SDK_DIR)

  - task: CopyFiles@2
    inputs:
      SourceFolder: 'app/android/app/build/outputs/apk/debug'
      Contents: '**/*.apk'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Copy Debug APK'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'app-debug-$(Agent.OS)'
    displayName: 'Publish App Artifact'

  # 서버 의존성 설치 (Run-From-Package 방식 배포 시 node_modules가 zip에 포함되어야 함)
  - script: |
      cd server
      npm install --production
    displayName: 'Install Server Dependencies'

  # 서버(Node.js) 코드를 zip으로 묶어 아티팩트 발행 (릴리즈 파이프라인에서 App Service 배포에 사용)
  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/server'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/server/server.zip'
      replaceExistingArchive: true
    displayName: 'Zip Server Code'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/server'
      ArtifactName: 'server-drop'
    displayName: 'Publish Server Artifact'
 